<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="15%" cy="25%" r="40%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="80%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="cardBorder" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0)" />
      <stop offset="50%" stop-color="rgba(255,255,255,0.08)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0F"/>

  <!-- Grid texture -->
  <g opacity="0.04">
    <line x1="0" y1="80" x2="1200" y2="80" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="560" x2="1200" y2="560" stroke="white" stroke-width="0.5"/>
    <line x1="80" y1="0" x2="80" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="560" y1="0" x2="560" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="880" y1="0" x2="880" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="1040" y1="0" x2="1040" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="1120" y1="0" x2="1120" y2="630" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Glow orbs -->
  <rect width="1200" height="630" fill="url(#glowBlue)"/>
  <rect width="1200" height="630" fill="url(#glowCyan)"/>
  <rect width="1200" height="630" fill="url(#glowPurple)"/>

  <!-- Glass card backgrounds -->
  <rect x="60" y="280" width="340" height="180" rx="16" fill="rgba(18,18,28,0.6)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="430" y="280" width="340" height="180" rx="16" fill="rgba(18,18,28,0.6)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="800" y="280" width="340" height="180" rx="16" fill="rgba(18,18,28,0.6)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Card top shine -->
  <line x1="76" y1="280" x2="384" y2="280" stroke="url(#cardBorder)" stroke-width="1"/>
  <line x1="446" y1="280" x2="754" y2="280" stroke="url(#cardBorder)" stroke-width="1"/>
  <line x1="816" y1="280" x2="1124" y2="280" stroke="url(#cardBorder)" stroke-width="1"/>

  <!-- Card 1: Block Height -->
  <text x="88" y="316" fill="#6B6B80" font-family="monospace" font-size="11" font-weight="500" letter-spacing="0.5">BLOCK HEIGHT</text>
  <text x="88" y="360" fill="#F0F0F5" font-family="monospace" font-size="36" font-weight="700">2,820</text>
  <rect x="88" y="386" width="140" height="4" rx="2" fill="rgba(59,130,246,0.15)"/>
  <rect x="88" y="386" width="95" height="4" rx="2" fill="url(#logoGrad)"/>
  <text x="88" y="420" fill="#6B6B80" font-family="monospace" font-size="11">OPNet Testnet</text>
  <circle cx="78" y="420" r="3" fill="#22C55E"/>

  <!-- Card 2: Gas chart bars -->
  <text x="458" y="316" fill="#6B6B80" font-family="monospace" font-size="11" font-weight="500" letter-spacing="0.5">GAS USED PER BLOCK</text>
  <rect x="458" y="340" width="14" height="80" rx="3" fill="url(#barGrad)" opacity="0.5"/>
  <rect x="480" y="355" width="14" height="65" rx="3" fill="url(#barGrad)" opacity="0.6"/>
  <rect x="502" y="330" width="14" height="90" rx="3" fill="url(#barGrad)" opacity="0.55"/>
  <rect x="524" y="345" width="14" height="75" rx="3" fill="url(#barGrad)" opacity="0.65"/>
  <rect x="546" y="360" width="14" height="60" rx="3" fill="url(#barGrad)" opacity="0.5"/>
  <rect x="568" y="335" width="14" height="85" rx="3" fill="url(#barGrad)" opacity="0.7"/>
  <rect x="590" y="320" width="14" height="100" rx="3" fill="url(#barGrad)" opacity="0.8"/>
  <rect x="612" y="350" width="14" height="70" rx="3" fill="url(#barGrad)" opacity="0.55"/>
  <rect x="634" y="338" width="14" height="82" rx="3" fill="url(#barGrad)" opacity="0.6"/>
  <rect x="656" y="355" width="14" height="65" rx="3" fill="url(#barGrad)" opacity="0.5"/>
  <rect x="678" y="326" width="14" height="94" rx="3" fill="#06B6D4" opacity="0.9"/>
  <rect x="700" y="342" width="14" height="78" rx="3" fill="url(#barGrad)" opacity="0.6"/>
  <rect x="722" y="365" width="14" height="55" rx="3" fill="url(#barGrad)" opacity="0.45"/>
  <text x="458" y="444" fill="#6B6B80" font-family="monospace" font-size="10">Live</text>
  <circle cx="480" cy="440" r="3" fill="#22C55E" opacity="0.8"/>

  <!-- Card 3: Mempool / Wallet -->
  <text x="828" y="316" fill="#6B6B80" font-family="monospace" font-size="11" font-weight="500" letter-spacing="0.5">MEMPOOL</text>
  <text x="828" y="360" fill="#3B82F6" font-family="monospace" font-size="36" font-weight="700">147</text>
  <text x="828" y="390" fill="#6B6B80" font-family="monospace" font-size="12">pending transactions</text>
  <rect x="828" y="410" width="280" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="828" y="436" fill="#6B6B80" font-family="monospace" font-size="11">OPNet Ratio</text>
  <text x="1100" y="436" fill="#06B6D4" font-family="monospace" font-size="13" font-weight="600" text-anchor="end">23%</text>

  <!-- Logo -->
  <rect x="60" y="60" width="56" height="34" rx="7" fill="url(#logoGrad)"/>
  <text x="88" y="84" text-anchor="middle" fill="white" font-family="monospace" font-size="16" font-weight="700">OP</text>
  <text x="132" y="86" fill="#F0F0F5" font-family="monospace" font-size="28" font-weight="600">_TERMINAL</text>
  <rect x="380" y="66" width="2" height="24" fill="#06B6D4" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="60" y="140" fill="#A0A0B8" font-family="system-ui, sans-serif" font-size="20" font-weight="400">Real-time OPNet Network Monitor</text>
  <text x="60" y="175" fill="#6B6B80" font-family="system-ui, sans-serif" font-size="15">Live blocks, gas analytics, contract explorer &amp; wallet portfolio</text>

  <!-- Network badge -->
  <rect x="60" y="210" width="140" height="28" rx="14" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <circle cx="80" cy="224" r="4" fill="#22C55E"/>
  <text x="92" y="229" fill="#22C55E" font-family="monospace" font-size="11" font-weight="600">OPNet Testnet</text>

  <!-- Bitcoin L1 badge -->
  <rect x="215" y="210" width="100" height="28" rx="14" fill="rgba(247,147,26,0.1)" stroke="rgba(247,147,26,0.2)" stroke-width="1"/>
  <text x="235" y="229" fill="#F7931A" font-family="monospace" font-size="11" font-weight="600">Bitcoin L1</text>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(10,10,15,0.8)"/>
  <text x="60" y="620" fill="#6B6B80" font-family="monospace" font-size="11">op-terminal.vercel.app</text>
  <text x="1140" y="620" fill="#6B6B80" font-family="monospace" font-size="11" text-anchor="end">vibecode.finance 2026</text>
</svg>
